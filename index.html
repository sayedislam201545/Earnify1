<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Earnify – Earn Coins</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; transition: background 0.3s, color 0.3s; -webkit-font-smoothing: antialiased; }
        body.light-theme { background: #F8F9FA; color: #2C3E50; --surface: #FFFFFF; --border: #E9ECEF; --shadow: 0 8px 24px rgba(0,0,0,0.05); }
        body.dark-theme { background: #1B2631; color: #FDFEFE; --surface: #283747; --border: #566573; --shadow: 0 8px 24px rgba(0,0,0,0.2); }
        #app { max-width: 500px; margin: 0 auto; padding-bottom: 80px; display: none; }
        /* premium header with wallet icon */
        .premium-header {
            background: linear-gradient(135deg, #E74C3C, #F39C12);
            padding: 16px 20px;
            border-radius: 0 0 28px 28px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 20px rgba(231,76,60,0.3);
        }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 52px; height: 52px; border-radius: 50%; border: 3px solid white; object-fit: cover; background: #fff; }
        .user-name { font-weight: 700; font-size: 1.1rem; line-height: 1.2; }
        .main-balance { font-size: 0.85rem; opacity: 0.9; }
        .main-balance span { font-weight: 700; font-size: 1rem; }
        .wallet-icon-btn {
            background: rgba(255,255,255,0.2);
            width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .wallet-icon-btn:active { transform: scale(0.94); }
        .wallet-icon-btn i { font-size: 1.6rem; }

        /* page & card styles */
        .page { display: none; padding: 18px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .card {
            background: var(--surface);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .stats-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; margin: 20px 0; }
        .stat-card {
            background: var(--surface);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .stat-card h4 { font-size: 0.7rem; text-transform: uppercase; opacity: 0.7; margin-bottom: 8px; }
        .stat-card p { font-size: 1.4rem; font-weight: 700; color: #E74C3C; }
        .task-container {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--surface);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .task-icon-img { width: 48px; height: 48px; border-radius: 14px; object-fit: cover; }
        .task-info { flex: 1; }
        .task-info h3 { font-size: 1rem; font-weight: 600; }
        .task-info p { font-size: 0.75rem; opacity: 0.7; }
        .action-btn {
            background: linear-gradient(45deg, #E74C3C, #F39C12);
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .action-btn:active { transform: scale(0.96); }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .progress-container { margin: 15px 0; }
        .progress-bar-bg { height: 8px; background: #ddd; border-radius: 10px; overflow: hidden; }
        .progress-bar-fg { height: 100%; background: linear-gradient(90deg, #E74C3C, #F39C12); width: 0%; border-radius: 10px; }
        .earning-wallet-card {
            background: linear-gradient(135deg, #E74C3C20, #F39C1220);
            border-radius: 20px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        /* premium withdrawal modal & form */
        .methods-grid-3 {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 16px;
            margin: 20px 0;
        }
        .method-card-item {
            background: var(--surface);
            border-radius: 28px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: all 0.2s;
        }
        .method-card-item:active { transform: scale(0.96); }
        .method-card-item img { width: 70px; height: 70px; object-fit: contain; margin-bottom: 6px; }
        .withdraw-form-premium {
            background: var(--surface);
            border-radius: 28px;
            padding: 24px;
            margin-top: 10px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 8px; font-size: 0.85rem; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: var(--surface);
            font-family: inherit;
            font-size: 0.95rem;
        }
        .fee-info {
            background: rgba(231,76,60,0.1);
            border-radius: 20px;
            padding: 14px;
            margin: 18px 0;
            text-align: center;
            border-left: 4px solid #E74C3C;
        }
        .success-withdraw-card {
            text-align: center;
            background: linear-gradient(145deg, #27AE6010, #2ECC7110);
            border-radius: 32px;
            padding: 28px 20px;
            border: 1px solid #27AE6040;
        }
        .success-withdraw-card i { font-size: 4rem; color: #27AE60; margin-bottom: 12px; }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; max-width: 500px; margin: 0 auto;
            display: flex; justify-content: space-around; align-items: center;
            height: 70px;
            background: #1a1a1a;
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
            z-index: 1000;
        }
        .nav-btn {
            background: none; border: none;
            display: flex; flex-direction: column; align-items: center;
            font-family: inherit; font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            cursor: pointer; transition: 0.2s;
            flex: 1;
        }
        .nav-btn i { font-size: 1.4rem; margin-bottom: 4px; }
        .nav-btn.active { color: #F39C12; }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none; justify-content: center; align-items: center;
            z-index: 2000;
        }
        .modal-container {
            background: var(--surface);
            border-radius: 32px;
            width: 90%; max-width: 420px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .close-modal { float: right; font-size: 1.8rem; cursor: pointer; line-height: 1; }
        .loader-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #F8F9FA; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        body.dark-theme .loader-screen { background: #1B2631; }
        .spinner { width: 50px; height: 50px; border: 4px solid #E74C3C20; border-top: 4px solid #E74C3C; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div id="loader-screen" class="loader-screen"><div class="spinner"></div><p id="loading-progress">0%</p></div>
<div id="app">
    <div class="premium-header">
        <div class="user-info">
            <img id="user-photo" class="user-avatar" src="https://via.placeholder.com/52">
            <div>
                <div class="user-name" id="user-name">User</div>
                <div class="main-balance"><span id="main-balance">0</span> Coins</div>
            </div>
        </div>
        <div class="wallet-icon-btn" id="wallet-icon-btn"><i class="fas fa-wallet"></i></div>
    </div>
    <main>
        <div id="home-page" class="page active">
            <div class="stats-grid">
                <div class="stat-card"><h4>Today's Ads</h4><p id="daily-ads-watched">0 / 0</p></div>
                <div class="stat-card"><h4>Total Referrals</h4><p id="referral-count">0</p></div>
                <div class="stat-card"><h4>Total Ads</h4><p id="total-ads-watched">0</p></div>
                <div class="stat-card"><h4>Total Earned</h4><p id="total-earned">0</p></div>
            </div>
            <div id="earnings-graph" class="card"><h3>Last 7 Days Earnings</h3><div id="earnings-chart" class="chart" style="display:flex; gap:8px; align-items:flex-end; height:140px;"></div><div id="chart-labels" class="chart-labels" style="display:flex; justify-content:space-around;"></div></div>
            <div id="dynamic-links-container"></div>
        </div>
        <div id="tasks-page" class="page">
            <div class="earning-wallet-card">
                <div><h3>💰 Earning Wallet</h3><small>Min 100 to move</small></div>
                <div><p style="font-size:1.6rem; font-weight:700; color:#E74C3C;"><span id="earning-wallet-balance">0</span></p><button id="move-to-balance-btn" class="action-btn" style="padding:4px 14px;">Move</button></div>
            </div>
            <div id="ad-progress-container"></div>
            <div id="ad-task-container"></div>
            <h2>📢 Bonus Tasks</h2><div id="dynamic-tasks-container"></div>
        </div>
        <div id="leaderboard-page" class="page">
            <h2>🏆 Leaderboard</h2>
            <div class="leaderboard-toggle" style="display:flex; gap:12px; margin:15px 0;">
                <button class="toggle-btn active" data-board="referral">Top Referrers</button>
                <button class="toggle-btn" data-board="earning">Top Earners</button>
            </div>
            <div id="referral-board"><ul id="referral-leaderboard-list" style="list-style:none;"></ul></div>
            <div id="earning-board" style="display:none;"><ul id="earning-leaderboard-list" style="list-style:none;"></ul></div>
        </div>
        <div id="profile-page" class="page">
            <div id="referral-section"></div>
            <div id="withdraw-section"></div>
            <div id="withdrawal-history-section" style="margin-top:20px;"><h3>📜 Withdrawal History</h3><div id="withdrawal-history-list"></div></div>
        </div>
    </main>
    <nav class="bottom-nav">
        <button class="nav-btn active" data-page="home-page"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="nav-btn" data-page="tasks-page"><i class="fas fa-tasks"></i><span>Tasks</span></button>
        <button class="nav-btn" data-page="leaderboard-page"><i class="fas fa-trophy"></i><span>Leaderboard</span></button>
        <button class="nav-btn" data-page="profile-page"><i class="fas fa-user-alt"></i><span>Profile</span></button>
    </nav>
</div>

<!-- Modals -->
<div id="wallet-modal" class="modal-overlay"><div class="modal-container"><div style="display:flex; justify-content:space-between;"><h3>💰 Withdraw</h3><span class="close-modal">&times;</span></div><div id="wallet-modal-body"></div></div></div>
<div id="withdraw-form-modal" class="modal-overlay"><div class="modal-container" id="withdraw-form-container"></div></div>
<div id="global-popup" class="modal-overlay"><div class="modal-container" id="global-popup-body"></div></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
(function(){
    const tg = window.Telegram.WebApp;
    const firebaseConfig = {
        apiKey: "AIzaSyB03K2JAA4iyBLgAX6Nv9Z0VMGX3qMGqBc",
        authDomain: "earnify-f3ac8.firebaseapp.com",
        databaseURL: "https://earnify-f3ac8-default-rtdb.firebaseio.com",
        projectId: "earnify-f3ac8",
        storageBucket: "earnify-f3ac8.firebasestorage.app",
        messagingSenderId: "273672601348",
        appId: "1:273672601348:web:4d627b5689575857345a51"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let appConfig = {}, userState = {}, tgUser = {}, earningWallet = 0;
    let adRunning = false;
    let leaderboardData = { referral: [], earning: [] };
    let userWithdrawHistory = [];

    // helpers
    function showModal(id){ document.getElementById(id).style.display='flex'; }
    function hideModal(id){ document.getElementById(id).style.display='none'; }
    function showAlert(msg, cb){ let body=document.getElementById('global-popup-body'); body.innerHTML=`<div style="text-align:center; padding:20px;"><h3>Notification</h3><p>${msg}</p><button class="action-btn close-modal">OK</button></div>`; showModal('global-popup'); document.querySelector('#global-popup .close-modal').onclick=()=>{ hideModal('global-popup'); if(cb) cb(); }; }
    
    // ad system with retry (from reference)
    async function loadAdAndWait(zoneId, retries=3){
        for(let i=0;i<retries;i++){
            if(typeof window["show_"+zoneId] === "function") return true;
            let script = document.createElement("script");
            script.src = "https://libtl.com/sdk.js";
            script.async = true;
            script.setAttribute("data-zone", zoneId);
            document.body.appendChild(script);
            await new Promise(r=>setTimeout(r, 1500));
            if(typeof window["show_"+zoneId] === "function") return true;
        }
        throw new Error("Ad SDK failed");
    }
    async function handleWatchAd(){
        if(adRunning) return;
        let zoneId = appConfig.adZoneId || '10806089';
        if(userState.dailyAdCount >= (appConfig.dailyAdLimit||50)){ showAlert("Daily limit reached"); return; }
        showModal('global-popup');
        document.getElementById('global-popup-body').innerHTML = `<div class="popup-loader"><div class="spinner"></div><p>অপেক্ষা করুন, এড আসছে...</p></div>`;
        adRunning = true;
        try{
            await loadAdAndWait(zoneId, 3);
            if(typeof window["show_"+zoneId] !== 'function') throw new Error("not ready");
            await window["show_"+zoneId]();
            hideModal('global-popup');
            let adValue = parseFloat(appConfig.adValue) || 10;
            earningWallet += adValue;
            localStorage.setItem(`earningWallet_${tgUser.id}`, earningWallet);
            userState.dailyAdCount++;
            userState.lifetimeAdCount = (userState.lifetimeAdCount||0)+1;
            userState.totalEarned = (userState.totalEarned||0)+adValue;
            await db.ref(`users/${tgUser.id}`).update({ dailyAdCount:userState.dailyAdCount, lifetimeAdCount:userState.lifetimeAdCount, totalEarned:userState.totalEarned });
            let today = new Date().toISOString().slice(0,10);
            await db.ref(`userEarnings/${tgUser.id}/${today}`).transaction(v=>(v||0)+adValue);
            // referral commission
            await processReferralEarnings(tgUser.id, adValue, 'Video Ad');
            showAlert(`+${adValue} Coins added!`);
            renderAll();
        } catch(e){ hideModal('global-popup'); showAlert("Ad failed, please retry."); console.error(e); }
        adRunning = false;
    }
    async function processReferralEarnings(userId, earnedAmount, source){
        if(!earnedAmount || earnedAmount<=0) return;
        let userSnap = await db.ref(`users/${userId}`).once('value');
        let user = userSnap.val();
        if(!user || !user.referredBy) return;
        let referrerId = user.referredBy;
        let percent = parseFloat(appConfig.referralPercent) || 0;
        if(percent<=0) return;
        let commission = (earnedAmount * percent) / 100;
        if(commission<=0) return;
        await db.ref(`users/${referrerId}/earningWallet`).transaction(v=>(v||0)+commission);
        await addHistory(referrerId, 'Referral Commission', `Commission from ${user.firstName} (${source})`, commission, 'Completed');
    }
    async function addHistory(uid, type, name, reward, status){
        await db.ref(`users/${uid}/history`).push({ type, name, reward, status, timestamp: firebase.database.ServerValue.TIMESTAMP });
    }
    // device lock
    async function enforceDeviceLock(uid){
        let stored = localStorage.getItem('device_id');
        if(!stored){ stored = 'dev_'+Date.now()+'_'+Math.random().toString(36); localStorage.setItem('device_id', stored); }
        let deviceId = stored.replace(/[^a-zA-Z0-9_-]/g,'_');
        let snap = await db.ref(`deviceLock/${deviceId}`).once('value');
        if(snap.val() && snap.val() !== uid){ showAlert("Device linked to another account.", ()=>tg.close()); throw new Error("Locked"); }
        if(!snap.val()) await db.ref(`deviceLock/${deviceId}`).set(uid);
    }
    // load user data with referral handling
    async function loadUserData(){
        let ref = db.ref(`users/${tgUser.id}`);
        let snap = await ref.once('value');
        let data = snap.val();
        if(!data){
            let startParam = tg.initDataUnsafe?.start_param;
            let referralId = (startParam && !isNaN(startParam)) ? startParam : null;
            data = { id: tgUser.id, firstName: tgUser.first_name||'', lastName: tgUser.last_name||'', username: tgUser.username||'', photoUrl: tgUser.photo_url||'', balance:0, earningWallet:0, referrals:0, referredBy: referralId, totalEarned:0, lifetimeAdCount:0, lastAdWatchDate: new Date().toISOString().slice(0,10), dailyAdCount:0, completedTasks:{}, welcomed:false };
            await ref.set(data);
            if(referralId && referralId != tgUser.id && appConfig.referralBonus){
                let bonus = parseFloat(appConfig.referralBonus) || 0;
                if(bonus>0){
                    await db.ref(`users/${referralId}/earningWallet`).transaction(b=>(b||0)+bonus);
                    await db.ref(`users/${referralId}/referrals`).transaction(r=>(r||0)+1);
                    await addHistory(referralId, 'Referral Bonus', `Joined via ${tgUser.id}`, bonus, 'Completed');
                } else {
                    await db.ref(`users/${referralId}/referrals`).transaction(r=>(r||0)+1);
                }
            }
        }
        let today = new Date().toISOString().slice(0,10);
        if(data.lastAdWatchDate !== today){ data.dailyAdCount=0; await ref.update({dailyAdCount:0, lastAdWatchDate:today}); }
        userState = data;
        earningWallet = parseFloat(localStorage.getItem(`earningWallet_${tgUser.id}`) || userState.earningWallet || 0);
        if(earningWallet !== userState.earningWallet) await ref.update({ earningWallet });
    }
    async function loadWithdrawHistory(){
        let completed = await db.ref('withdrawals/completed').orderByChild('userId').equalTo(tgUser.id).once('value');
        let rejected = await db.ref('withdrawals/rejected').orderByChild('userId').equalTo(tgUser.id).once('value');
        let items = [];
        completed.forEach(c=>items.push(c.val()));
        rejected.forEach(r=>items.push(r.val()));
        items.sort((a,b)=>b.timestamp-a.timestamp);
        userWithdrawHistory = items;
    }
    // premium withdrawal flow
    async function startWithdraw(type){
        let methods = type==='bdt'?(appConfig.withdrawBDTMethods||[]):(appConfig.withdrawUSDTMethods||[]);
        if(!methods.length){ showAlert("No methods available"); return; }
        let grid = `<div class="methods-grid-3">`+methods.map((m,i)=>`<div class="method-card-item" data-idx="${i}"><img src="${m.photo}" style="width:70px;"><p style="font-size:0.7rem;">${m.name}</p></div>`).join('')+`</div>`;
        document.getElementById('wallet-modal-body').innerHTML = grid;
        showModal('wallet-modal');
        document.querySelectorAll('.method-card-item[data-idx]').forEach(el=>{
            el.addEventListener('click', async ()=>{
                let idx = parseInt(el.dataset.idx);
                let method = methods[idx];
                let rate = type==='bdt'?(appConfig.coinToBDT||0):(appConfig.coinToUSDT||0);
                let feePercent = appConfig.withdrawFeePercent || 0;
                let formHtml = `
                    <div class="withdraw-form-premium">
                        <h3 style="margin-bottom:15px;">💸 Withdraw via ${method.name}</h3>
                        <div class="form-group"><label>Account Number / ID</label><input id="acc" placeholder="Enter ${type==='bdt'?'bKash/Nagad':'TRC20 address'}" required></div>
                        <div class="form-group"><label>Amount (Coins)</label><input type="number" id="coins" placeholder="Min ${method.min}" required></div>
                        <div class="fee-info" id="fee-preview">💰 You will receive: 0.00 ${type.toUpperCase()} <br> <small>Fee: 0%</small></div>
                        <button id="confirmWithdrawBtn" class="action-btn" style="width:100%;">Request Withdrawal</button>
                    </div>
                `;
                document.getElementById('withdraw-form-container').innerHTML = formHtml;
                hideModal('wallet-modal');
                showModal('withdraw-form-modal');
                let coinsInp = document.getElementById('coins');
                let updateFee = () => {
                    let coins = parseFloat(coinsInp.value) || 0;
                    let fiat = coins * rate;
                    let fee = fiat * (feePercent/100);
                    let receive = fiat - fee;
                    document.getElementById('fee-preview').innerHTML = `💰 You will receive: ${receive.toFixed(2)} ${type.toUpperCase()} <br><small>Fee: ${fee.toFixed(2)} (${feePercent}%)</small>`;
                };
                coinsInp.addEventListener('input', updateFee);
                document.getElementById('confirmWithdrawBtn').addEventListener('click', async ()=>{
                    let account = document.getElementById('acc').value.trim();
                    let coinAmount = parseFloat(coinsInp.value);
                    if(!account || isNaN(coinAmount) || coinAmount < method.min){ showAlert(`Min ${method.min} coins`); return; }
                    if(coinAmount > userState.balance){ showAlert("Insufficient main balance"); return; }
                    // deduct balance
                    await db.ref(`users/${tgUser.id}/balance`).set(userState.balance - coinAmount);
                    userState.balance -= coinAmount;
                    let reqId = db.ref('withdrawals/pending').push().key;
                    let req = { id:reqId, userId:tgUser.id, userName:`${userState.firstName} ${userState.lastName}`, method:method.name, account, amount:coinAmount, status:'pending', timestamp:firebase.database.ServerValue.TIMESTAMP, type };
                    await db.ref(`withdrawals/pending/${reqId}`).set(req);
                    // success modal like screenshot
                    let fiatAmount = coinAmount * rate;
                    let feeAmount = fiatAmount * (feePercent/100);
                    let receiveAmount = fiatAmount - feeAmount;
                    let successHtml = `
                        <div class="success-withdraw-card">
                            <i class="fas fa-check-circle"></i>
                            <h2>Withdrawal Successful!</h2>
                            <div style="margin:20px 0; text-align:left; background:rgba(0,0,0,0.05); border-radius:24px; padding:16px;">
                                <p><strong>Amount:</strong> ${coinAmount.toFixed(0)} Coins</p>
                                <p><strong>Method:</strong> ${method.name}</p>
                                <p><strong>Number:</strong> ${account.slice(0,4)}****${account.slice(-3)}</p>
                                <p><strong>Time:</strong> ${new Date().toLocaleTimeString()}</p>
                            </div>
                            <p>You will be received ${receiveAmount.toFixed(2)} ${type.toUpperCase()}<br><small>(Fee: ${feeAmount.toFixed(2)})</small></p>
                            <button class="action-btn close-modal" style="margin-top:15px;">Done →</button>
                        </div>
                    `;
                    document.getElementById('global-popup-body').innerHTML = successHtml;
                    hideModal('withdraw-form-modal');
                    showModal('global-popup');
                    document.querySelector('#global-popup .close-modal').onclick = ()=>{ hideModal('global-popup'); renderAll(); };
                    renderAll();
                });
            });
        });
    }
    // render all UI
    function renderAll(){
        document.getElementById('user-photo').src = userState.photoUrl || 'https://via.placeholder.com/52';
        document.getElementById('user-name').innerHTML = `${userState.firstName} ${userState.lastName}`;
        document.getElementById('main-balance').innerText = (userState.balance||0).toFixed(0);
        document.getElementById('daily-ads-watched').innerHTML = `${userState.dailyAdCount||0} / ${appConfig.dailyAdLimit||50}`;
        document.getElementById('referral-count').innerText = userState.referrals||0;
        document.getElementById('total-ads-watched').innerText = userState.lifetimeAdCount||0;
        document.getElementById('total-earned').innerText = (userState.totalEarned||0).toFixed(0);
        document.getElementById('earning-wallet-balance').innerText = earningWallet.toFixed(0);
        document.getElementById('move-to-balance-btn').disabled = earningWallet < 100;
        renderAdTask(); renderAdProgress(); renderDynamicTasks(); renderReferralSection(); renderWithdrawSection(); renderEarningsGraph(); renderDynamicLinks(); renderLeaderboard(); renderWithdrawHistory();
    }
    async function renderEarningsGraph(){
        let today=new Date(), dates=[], earnings=[];
        for(let i=6;i>=0;i--){ let d=new Date(today); d.setDate(today.getDate()-i); dates.push(d.toISOString().slice(0,10)); }
        for(let date of dates){ let snap=await db.ref(`userEarnings/${tgUser.id}/${date}`).once('value'); earnings.push(snap.val()||0); }
        let maxE=Math.max(...earnings,1), chartDiv=document.getElementById('earnings-chart'), labelsDiv=document.getElementById('chart-labels');
        if(chartDiv){ chartDiv.innerHTML=''; labelsDiv.innerHTML=''; earnings.forEach((val,i)=>{ let height=(val/maxE)*100; chartDiv.innerHTML+=`<div class="bar" style="height:${height}%; width:12%; background:linear-gradient(to top, #E74C3C, #F39C12); border-radius:8px 8px 0 0; position:relative;"><span style="position:absolute; bottom:100%; left:50%; transform:translateX(-50%); background:#2C3E50; color:white; padding:2px 6px; border-radius:12px; font-size:10px;">${val}</span></div>`; labelsDiv.innerHTML+=`<span>${new Date(dates[i]).getDate()}</span>`; }); }
    }
    function renderAdProgress(){
        let dailyLimit = appConfig.dailyAdLimit||50, watched = userState.dailyAdCount||0, percent = (watched/dailyLimit)*100;
        document.getElementById('ad-progress-container').innerHTML = `<div class="progress-container"><div class="progress-info"><span>Daily Ad Progress</span><span>${watched}/${dailyLimit}</span></div><div class="progress-bar-bg"><div class="progress-bar-fg" style="width:${percent}%"></div></div></div>`;
    }
    function renderAdTask(){
        let container = document.getElementById('ad-task-container');
        container.innerHTML = `<div class="task-container"><img class="task-icon-img" src="https://img.icons8.com/color/96/play--v1.png"><div class="task-info"><h3>Watch Ad</h3><p>Earn ${appConfig.adValue||10} Coins</p></div><button id="watch-ad-btn" class="action-btn">Watch Now</button></div>`;
        document.getElementById('watch-ad-btn')?.addEventListener('click', handleWatchAd);
    }
    async function renderDynamicTasks(){
        let tasks = appConfig.tasks ? Object.entries(appConfig.tasks).map(([k,v])=>({key:k,...v})) : [];
        let container = document.getElementById('dynamic-tasks-container'); container.innerHTML='';
        for(let task of tasks){
            let completed = userState.completedTasks?.[task.key];
            let btn = `<button class="action-btn" data-task-id="${task.key}" data-task-url="${task.url}" ${completed?'disabled':''}>${completed?'Claimed':'Claim Bonus'}</button>`;
            let div = document.createElement('div'); div.className='task-container';
            div.innerHTML = `<img class="task-icon-img" src="${task.icon}"><div class="task-info"><h3>${task.name}</h3><p>+${task.reward} Coins</p></div>${btn}`;
            container.appendChild(div);
        }
        document.querySelectorAll('[data-task-id]').forEach(btn=>{
            btn.addEventListener('click', async (e)=>{
                let taskId = btn.dataset.taskId, task=appConfig.tasks[taskId];
                if(!task || userState.completedTasks?.[taskId]) return;
                tg.openLink(btn.dataset.taskUrl);
                btn.disabled=true; btn.textContent='Verifying...';
                setTimeout(async ()=>{
                    await db.ref(`users/${tgUser.id}/completedTasks/${taskId}`).set(true);
                    await db.ref(`users/${tgUser.id}/earningWallet`).transaction(v=>(v||0)+task.reward);
                    earningWallet += task.reward;
                    localStorage.setItem(`earningWallet_${tgUser.id}`, earningWallet);
                    userState.totalEarned = (userState.totalEarned||0)+task.reward;
                    await db.ref(`users/${tgUser.id}/totalEarned`).set(userState.totalEarned);
                    if(!userState.completedTasks) userState.completedTasks={};
                    userState.completedTasks[taskId]=true;
                    await processReferralEarnings(tgUser.id, task.reward, 'TG Task');
                    showAlert(`+${task.reward} Coins added!`);
                    renderAll();
                },5000);
            });
        });
    }
    function renderReferralSection(){
        let link = `https://t.me/${appConfig.botUsername}/app?startapp=${tgUser.id}`;
        document.getElementById('referral-section').innerHTML = `<div class="card"><h3>Refer & Earn</h3><p>Invite friends, earn <strong>${appConfig.referralBonus||0} Coins</strong> + <strong>${appConfig.referralPercent||0}%</strong> of their earnings!</p><div style="display:flex; gap:8px;"><input id="ref-link" value="${link}" readonly style="flex:1; padding:12px; border-radius:40px; border:1px solid var(--border);"><button id="copy-ref" class="action-btn">Copy</button></div></div>`;
        document.getElementById('copy-ref')?.addEventListener('click',()=>{ navigator.clipboard.writeText(link); showAlert("Link copied!"); });
    }
    function renderWithdrawSection(){
        let options = '';
        if(appConfig.withdrawBDTMethods) options += appConfig.withdrawBDTMethods.map(m=>`<option value="bdt_${m.name}">${m.name} (BDT)</option>`).join('');
        if(appConfig.withdrawUSDTMethods) options += appConfig.withdrawUSDTMethods.map(m=>`<option value="usdt_${m.name}">${m.name} (USDT)</option>`).join('');
        document.getElementById('withdraw-section').innerHTML = `<div class="card"><h3>💸 Request Withdrawal</h3><form id="quick-withdraw"><div class="form-group"><label>Method</label><select id="quick-method">${options}</select></div><div class="form-group"><label>Account</label><input id="quick-account"></div><div class="form-group"><label>Coins</label><input type="number" id="quick-amount"></div><button type="submit" class="action-btn">Submit</button></form></div>`;
        document.getElementById('quick-withdraw').addEventListener('submit', async(e)=>{
            e.preventDefault();
            let val = document.getElementById('quick-method').value;
            let [type, methodName] = val.split('_');
            let methods = type==='bdt'?appConfig.withdrawBDTMethods:appConfig.withdrawUSDTMethods;
            let method = methods.find(m=>m.name===methodName);
            let account = document.getElementById('quick-account').value;
            let amount = parseFloat(document.getElementById('quick-amount').value);
            if(!method || !account || isNaN(amount) || amount<method.min){ showAlert(`Min ${method.min} coins`); return; }
            if(amount>userState.balance){ showAlert("Insufficient balance"); return; }
            await db.ref(`users/${tgUser.id}/balance`).set(userState.balance-amount);
            userState.balance -= amount;
            let reqId = db.ref('withdrawals/pending').push().key;
            await db.ref(`withdrawals/pending/${reqId}`).set({ id:reqId, userId:tgUser.id, userName:`${userState.firstName} ${userState.lastName}`, method:method.name, account, amount, status:'pending', timestamp:firebase.database.ServerValue.TIMESTAMP, type });
            showAlert("Request submitted!");
            renderAll();
        });
    }
    async function renderWithdrawHistory(){
        await loadWithdrawHistory();
        let list = document.getElementById('withdrawal-history-list');
        if(!userWithdrawHistory.length){ list.innerHTML='<p>No withdrawals yet.</p>'; return; }
        list.innerHTML = userWithdrawHistory.map(item=>`<div class="history-item" style="background:var(--surface); border-radius:20px; padding:12px; margin-bottom:12px;"><div><strong>${item.amount} Coins</strong> via ${item.method}</div><small>${new Date(item.timestamp).toLocaleString()}</small><span style="float:right; color:${item.status==='completed'?'#27AE60':'#e74c3c'}">${item.status}</span></div>`).join('');
    }
    async function renderLeaderboard(){
        let active = document.querySelector('.toggle-btn.active').dataset.board;
        let listId = active==='referral'?'referral-leaderboard-list':'earning-leaderboard-list';
        let data = active==='referral'?leaderboardData.referral:leaderboardData.earning;
        document.getElementById('referral-board').style.display = active==='referral'?'block':'none';
        document.getElementById('earning-board').style.display = active==='earning'?'block':'none';
        let ul = document.getElementById(listId); ul.innerHTML='';
        data.forEach((u,i)=> { let score = active==='referral'?(u.referrals||0):(u.totalEarned||0).toFixed(0); ul.innerHTML+=`<li class="leaderboard-item" style="display:flex; align-items:center; gap:12px; padding:8px; background:var(--surface); border-radius:20px; margin-bottom:8px;"><span style="font-weight:700;">#${i+1}</span><img src="${u.photoUrl||'https://via.placeholder.com/40'}" width="40" style="border-radius:50%;"><span style="flex:1;">${u.firstName}</span><span style="color:#E74C3C;">${score}</span></li>`; });
    }
    function renderDynamicLinks(){
        let links = appConfig.links ? Object.values(appConfig.links) : [];
        let container = document.getElementById('dynamic-links-container'); container.innerHTML='';
        links.forEach(link=>{ container.innerHTML+=`<div class="task-container"><img class="task-icon-img" src="${link.icon}"><div class="task-info"><h3>${link.name}</h3></div><button class="action-btn" onclick="window.Telegram.WebApp.openLink('${link.url}')">Visit</button></div>`; });
    }
    async function moveToBalance(){
        if(earningWallet<100) return;
        await db.ref(`users/${tgUser.id}/balance`).transaction(v=>(v||0)+earningWallet);
        await db.ref(`users/${tgUser.id}/earningWallet`).set(0);
        userState.balance += earningWallet;
        earningWallet = 0;
        localStorage.setItem(`earningWallet_${tgUser.id}`, '0');
        renderAll();
        showAlert("Moved to main balance!");
    }
    // init
    async function init(){
        tg.ready(); tg.expand();
        document.body.className = (tg.colorScheme||'light')+'-theme';
        tgUser = tg.initDataUnsafe?.user;
        if(!tgUser){ document.getElementById('loader-screen').innerHTML='<p>Error: No Telegram user</p>'; return; }
        let configSnap = await db.ref('config').once('value');
        appConfig = configSnap.val() || {};
        if(!appConfig.adZoneId) appConfig.adZoneId='10806089';
        if(!appConfig.adValue) appConfig.adValue=10;
        if(!appConfig.dailyAdLimit) appConfig.dailyAdLimit=50;
        if(!appConfig.referralBonus) appConfig.referralBonus=100;
        await enforceDeviceLock(tgUser.id);
        await loadUserData();
        let referralBoard = await db.ref('users').orderByChild('referrals').limitToLast(10).once('value');
        let earningBoard = await db.ref('users').orderByChild('totalEarned').limitToLast(10).once('value');
        leaderboardData.referral=[]; leaderboardData.earning=[];
        referralBoard.forEach(c=>leaderboardData.referral.push(c.val())); leaderboardData.referral.reverse();
        earningBoard.forEach(c=>leaderboardData.earning.push(c.val())); leaderboardData.earning.reverse();
        renderAll();
        document.getElementById('loader-screen').style.display='none';
        document.getElementById('app').style.display='block';
        // popup message
        let popupMsg = await db.ref('config/popupMessage').once('value');
        if(popupMsg.val()?.title){
            let p = popupMsg.val();
            let linksHtml = p.links?.map(l=>`<a href="${l.url}" target="_blank" style="margin:5px; display:inline-block;"><img src="${l.image}" width="40"> ${l.name}</a>`).join('')||'';
            document.getElementById('global-popup-body').innerHTML = `<div><h2>${p.title}</h2><p>${p.description}</p>${linksHtml}<button class="action-btn close-modal">Close</button></div>`;
            showModal('global-popup');
        }
        document.getElementById('wallet-icon-btn').addEventListener('click',()=>{
            let bdtImg = appConfig.walletUI?.bdtPhoto || 'https://img.icons8.com/color/96/bangladesh.png';
            let usdtImg = appConfig.walletUI?.usdtPhoto || 'https://img.icons8.com/color/96/us-dollar.png';
            let historyImg = appConfig.walletUI?.historyPhoto || 'https://img.icons8.com/color/96/history.png';
            document.getElementById('wallet-modal-body').innerHTML = `<div class="methods-grid-3"><div id="bdt-withdraw-card" class="method-card-item"><img src="${bdtImg}"></div><div id="usdt-withdraw-card" class="method-card-item"><img src="${usdtImg}"></div><div id="history-card" class="method-card-item"><img src="${historyImg}"></div></div>`;
            showModal('wallet-modal');
            document.getElementById('bdt-withdraw-card').onclick = ()=>{ hideModal('wallet-modal'); startWithdraw('bdt'); };
            document.getElementById('usdt-withdraw-card').onclick = ()=>{ hideModal('wallet-modal'); startWithdraw('usdt'); };
            document.getElementById('history-card').onclick = async ()=>{ hideModal('wallet-modal'); await loadWithdrawHistory(); renderWithdrawHistory(); showModal('global-popup'); document.getElementById('global-popup-body').innerHTML = `<h3>Withdraw History</h3><div id="history-list-here"></div><button class="action-btn close-modal">Close</button>`; document.getElementById('history-list-here').innerHTML = document.getElementById('withdrawal-history-list').innerHTML; };
        });
        document.getElementById('move-to-balance-btn').addEventListener('click', moveToBalance);
        document.querySelectorAll('.nav-btn').forEach(btn=>{
            btn.addEventListener('click',()=>{
                let pageId = btn.dataset.page;
                document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
                document.getElementById(pageId).classList.add('active');
                document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                if(pageId==='profile-page') renderWithdrawHistory();
                if(pageId==='leaderboard-page') renderLeaderboard();
            });
        });
        document.querySelectorAll('.toggle-btn').forEach(btn=>{
            btn.addEventListener('click',()=>{
                document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                renderLeaderboard();
            });
        });
    }
    init();
})();
</script>
</body>
</html>
