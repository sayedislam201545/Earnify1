<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Earnify | Premium Earn Coins</title>
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <!-- Telegram WebApp -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      transition: background 0.3s, color 0.3s;
    }
    body.light-theme {
      background: #f5f7fb;
      color: #1e293b;
      --surface: #ffffff;
      --surface-elevated: #ffffff;
      --border: #e2e8f0;
      --primary: #e74c3c;
      --secondary: #f39c12;
      --primary-gradient: linear-gradient(135deg, #e74c3c, #f39c12);
      --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 16px 32px rgba(0, 0, 0, 0.12);
    }
    body.dark-theme {
      background: #0f172a;
      color: #e2e8f0;
      --surface: #1e293b;
      --surface-elevated: #334155;
      --border: #334155;
      --primary: #e74c3c;
      --secondary: #f39c12;
      --primary-gradient: linear-gradient(135deg, #e74c3c, #f39c12);
      --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 16px 32px rgba(0, 0, 0, 0.5);
    }
    #app {
      max-width: 500px;
      margin: 0 auto;
      padding-bottom: 70px;
      position: relative;
    }
    /* Top Bar Premium */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--primary-gradient);
      backdrop-filter: blur(10px);
      color: white;
      box-shadow: var(--shadow-md);
    }
    .top-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .user-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.4);
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .user-info {
      line-height: 1.3;
    }
    .user-name {
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: -0.2px;
    }
    .main-balance {
      font-size: 0.75rem;
      opacity: 0.9;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .main-balance span {
      font-weight: 800;
      font-size: 1rem;
      background: rgba(255,255,255,0.2);
      padding: 2px 8px;
      border-radius: 20px;
    }
    .wallet-icon, .history-icon {
      background: rgba(255,255,255,0.2);
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.2s;
      backdrop-filter: blur(4px);
    }
    .wallet-icon:active, .history-icon:active {
      transform: scale(0.94);
      background: rgba(255,255,255,0.3);
    }
    /* Pages */
    .page {
      display: none;
      padding: 18px;
      animation: fadeSlide 0.35s ease;
    }
    .page.active {
      display: block;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Cards Premium */
    .card {
      background: var(--surface);
      border-radius: 28px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .stat-card {
      padding: 18px 12px;
      border-radius: 24px;
      text-align: center;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    .stat-card h4 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.7;
      margin-bottom: 8px;
    }
    .stat-card p {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
    }
    /* Task Container */
    .task-container {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border-radius: 24px;
      margin-bottom: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    .task-icon-img {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      object-fit: cover;
      background: var(--surface-elevated);
    }
    .task-info {
      flex: 1;
    }
    .task-info h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .task-info p {
      font-size: 0.75rem;
      opacity: 0.7;
    }
    .action-btn {
      padding: 10px 22px;
      background: var(--primary-gradient);
      border: none;
      border-radius: 40px;
      color: white;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
      box-shadow: 0 4px 10px rgba(231,76,60,0.3);
    }
    .action-btn:active {
      transform: scale(0.96);
    }
    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    /* Progress */
    .progress-container {
      margin: 18px 0;
    }
    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .progress-bar-bg {
      height: 8px;
      background: var(--border);
      border-radius: 20px;
      overflow: hidden;
    }
    .progress-bar-fg {
      height: 100%;
      background: var(--primary-gradient);
      width: 0%;
      border-radius: 20px;
    }
    /* Bottom Nav (smaller) */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 500px;
      margin: 0 auto;
      display: flex;
      justify-content: space-around;
      align-items: center;
      height: 64px;
      background: var(--surface);
      backdrop-filter: blur(20px);
      z-index: 1000;
      border-top: 1px solid var(--border);
      border-top-left-radius: 28px;
      border-top-right-radius: 28px;
      padding: 0 8px;
      box-shadow: 0 -8px 25px rgba(0,0,0,0.08);
    }
    .nav-btn {
      background: none;
      border: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      font-size: 0.65rem;
      font-weight: 500;
      color: rgba(128, 128, 128, 0.8);
      cursor: pointer;
      transition: all 0.2s;
      flex: 1;
      gap: 4px;
      padding: 6px 0;
    }
    .nav-btn i {
      font-size: 1.25rem;
    }
    .nav-btn.active {
      color: var(--secondary);
      font-weight: 700;
    }
    .home-nav-btn .home-icon-wrapper {
      width: 48px;
      height: 48px;
      background: var(--primary-gradient);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      box-shadow: 0 6px 14px rgba(231,76,60,0.4);
      margin-bottom: 2px;
      transition: all 0.25s;
    }
    .home-nav-btn.active .home-icon-wrapper {
      transform: translateY(-6px) scale(1.05);
    }
    .home-icon-wrapper i {
      font-size: 1.5rem;
    }
    /* Daily Check-in */
    .daily-checkin-card {
      background: linear-gradient(135deg, rgba(46,204,113,0.15), rgba(39,174,96,0.1));
      border: 1px solid rgba(46,204,113,0.3);
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    /* Profile */
    .profile-header-premium {
      text-align: center;
      padding: 28px 20px;
      background: linear-gradient(135deg, rgba(231,76,60,0.08), rgba(243,156,18,0.08));
      border: 1px solid var(--border);
      border-radius: 32px;
      margin-bottom: 20px;
    }
    .profile-avatar-large {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 4px solid white;
      box-shadow: var(--shadow-md);
      margin: 0 auto 15px;
      object-fit: cover;
    }
    /* Referral */
    .referral-card-premium {
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      border-radius: 32px;
      padding: 24px;
      color: white;
      text-align: center;
      margin-bottom: 20px;
      box-shadow: var(--shadow-lg);
    }
    .referral-link-box {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 10px 12px;
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .referral-link-box input {
      background: none;
      border: none;
      color: white;
      font-size: 0.8rem;
      flex: 1;
      outline: none;
      font-family: monospace;
    }
    .copy-btn-premium {
      background: white;
      color: #2575fc;
      border: none;
      border-radius: 14px;
      padding: 6px 14px;
      font-weight: 700;
      cursor: pointer;
    }
    /* Earning Wallet */
    .earning-wallet-card {
      background: linear-gradient(135deg, rgba(231,76,60,0.12), rgba(243,156,18,0.08));
      border-radius: 28px;
      padding: 18px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    /* Chart */
    .chart-container {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      height: 150px;
      margin-top: 16px;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--border);
      gap: 6px;
    }
    .chart-bar {
      width: 12%;
      background: linear-gradient(to top, #e74c3c, #f39c12);
      border-radius: 12px 12px 0 0;
      position: relative;
      transition: height 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    /* Modals */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(5px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }
    .modal-container {
      background: var(--surface);
      border-radius: 36px;
      width: 90%;
      max-width: 380px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 20px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
    }
    .methods-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin: 20px 0;
    }
    .method-card-item {
      text-align: center;
      background: var(--surface-elevated);
      padding: 14px 8px;
      border-radius: 24px;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid var(--border);
    }
    .method-card-item:active {
      transform: scale(0.96);
    }
    /* History Premium UI */
    .history-list {
      max-height: 65vh;
      overflow-y: auto;
      padding: 4px;
    }
    .history-item-premium {
      background: var(--surface-elevated);
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--border);
      transition: 0.2s;
    }
    .history-left h4 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .history-left p {
      font-size: 0.7rem;
      opacity: 0.7;
      margin-top: 2px;
    }
    .history-right {
      text-align: right;
    }
    .status-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 40px;
      display: inline-block;
    }
    .status-completed { background: #27ae60; color: white; }
    .status-pending { background: #f39c12; color: white; }
    .status-rejected { background: #e74c3c; color: white; }
    /* Loader */
    .loader-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--surface);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(231,76,60,0.2);
      border-top: 4px solid #e74c3c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .close-modal {
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: inherit;
    }
    .back-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      margin-right: 12px;
    }
  </style>
</head>
<body>
<div id="loader-screen" class="loader-screen">
  <div class="spinner"></div>
  <p id="loading-text" style="margin-top: 18px; font-weight: 600;">Earnify...</p>
  <p id="loading-progress" style="font-size: 0.9rem;"></p>
</div>

<div id="app" style="display: none;">
  <div class="top-bar">
    <div class="top-left">
      <img id="user-photo" class="user-avatar" src="https://via.placeholder.com/46">
      <div class="user-info">
        <div class="user-name" id="user-name">User</div>
        <div class="main-balance"><span id="main-balance">0</span></div>
      </div>
    </div>
    <div style="display: flex; gap: 8px;">
      <div class="history-icon" id="history-icon"><i class="fas fa-history"></i></div>
      <div class="wallet-icon" id="wallet-icon"><i class="fas fa-wallet"></i></div>
    </div>
  </div>
  <main>
    <div id="home-page" class="page active">
      <div class="earning-wallet-card">
        <h3><i class="fas fa-coins"></i> Earning Wallet</h3>
        <p style="font-size: 2rem; font-weight: 800; color: #e74c3c;"><span id="earning-wallet-balance">0</span> Coins</p>
        <small>Minimum 100 Coins to transfer</small>
        <button id="move-to-balance-btn" class="action-btn" style="width:100%; margin-top: 14px;">Move to Main Balance</button>
      </div>
      <div id="daily-checkin-container"></div>
      <div id="ad-progress-container"></div>
      <div id="ad-task-container"></div>
    </div>
    <div id="tg-tasks-page" class="page"><h3 style="margin-bottom: 14px;">🤖 Telegram Bonus</h3><div id="dynamic-tasks-container"></div></div>
    <div id="web-tasks-page" class="page"><h3 style="margin-bottom: 14px;">🌐 Web Tasks</h3><div id="web-tasks-container"></div></div>
    <div id="profile-page" class="page">
      <div class="profile-header-premium">
        <img id="profile-photo-large" class="profile-avatar-large" src="https://via.placeholder.com/96">
        <h2 id="profile-name-large" style="font-size: 1.5rem;">User Name</h2>
        <div class="profile-details" style="margin-top: 8px;"><p><i class="fas fa-id-badge"></i> ID: <span id="profile-id">0</span></p><p><i class="fas fa-at"></i> @<span id="profile-username">user</span></p></div>
      </div>
      <div class="stats-grid">
        <div class="stat-card"><h4>Today's Ads</h4><p id="daily-ads-watched">0/0</p></div>
        <div class="stat-card"><h4>Referrals</h4><p id="referral-count">0</p></div>
        <div class="stat-card"><h4>Total Ads</h4><p id="total-ads-watched">0</p></div>
        <div class="stat-card"><h4>Total Earned</h4><p id="total-earned">0</p></div>
      </div>
      <div class="card"><h3>📈 Last 7 Days</h3><div id="earnings-chart" class="chart-container"></div><div id="earnings-chart-labels" class="chart-labels" style="display:flex; justify-content: space-between; margin-top: 8px;"></div></div>
      <div id="referral-section"></div>
    </div>
  </main>
  <nav class="bottom-nav">
    <button class="nav-btn" data-page="tg-tasks-page"><i class="fab fa-telegram"></i><span>TG</span></button>
    <button class="nav-btn" data-page="web-tasks-page"><i class="fas fa-globe"></i><span>Web</span></button>
    <button class="nav-btn active home-nav-btn" data-page="home-page"><div class="home-icon-wrapper"><i class="fas fa-home"></i></div><span>Home</span></button>
    <button class="nav-btn" id="nav-support-btn"><i class="fas fa-headset"></i><span>Support</span></button>
    <button class="nav-btn" data-page="profile-page"><i class="fas fa-user"></i><span>Profile</span></button>
  </nav>
</div>

<!-- Modals -->
<div id="wallet-modal" class="modal-overlay"><div class="modal-container"><div class="modal-header" style="display:flex; justify-content: space-between;"><h3>💰 Wallet</h3><button class="close-modal">&times;</button></div><div id="wallet-modal-body"></div></div></div>
<div id="withdraw-flow-modal" class="modal-overlay"><div class="modal-container" id="withdraw-flow-container"></div></div>
<div id="global-popup" class="modal-overlay"><div class="modal-container" id="global-popup-body"></div></div>

<script>
  (function(){
    let tg = window.Telegram?.WebApp;
    let db, appConfig = {}, userState = {}, tgUser = {};
    window.adRunning = false;

    function formatTime(sec){ let m=Math.floor(sec/60), s=sec%60; return `${m}:${s<10?'0':''}${s}`; }
    function showModal(id){ let el=document.getElementById(id); if(el) el.style.display='flex'; }
    function hideModal(id){ let el=document.getElementById(id); if(el) el.style.display='none'; }
    function showAlert(msg, cb){
      let body = document.getElementById('global-popup-body');
      if(body){
        body.innerHTML = `<div style="text-align:center; padding:20px;"><h3>📢 Notification</h3><p style="margin:15px 0;">${msg}</p><button class="action-btn close-modal" style="margin-top:10px;">OK</button></div>`;
        showModal('global-popup');
        let btn = document.querySelector('#global-popup .close-modal');
        if(btn) btn.onclick = ()=>{ hideModal('global-popup'); if(cb) cb(); };
      } else { alert(msg); if(cb) cb(); }
    }
    async function addHistory(type, name, reward, status, message=""){
      await db.ref(`users/${tgUser.id}/history`).push({ type, name, reward, status, message, timestamp: firebase.database.ServerValue.TIMESTAMP });
    }
    async function sendAdminNotification(msg){
      let botToken = appConfig.botToken, chatId = appConfig.adminChatId || '8705098472';
      if(!botToken || !chatId) return;
      try{ await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ chat_id:chatId, text:msg }) }); } catch(e){}
    }
    async function loadMonetagAd(zoneId){
      return new Promise((resolve, reject)=>{
        if(typeof window[`show_${zoneId}`] === "function") return resolve();
        let script = document.createElement("script");
        script.src = "https://libtl.com/sdk.js";
        script.async = true;
        script.setAttribute("data-zone", zoneId);
        script.setAttribute("data-sdk", `show_${zoneId}`);
        script.onload = ()=>{
          let check = setInterval(()=>{
            if(typeof window[`show_${zoneId}`] === "function"){
              clearInterval(check);
              resolve();
            }
          }, 200);
          setTimeout(()=>{ clearInterval(check); reject("Ad load timeout"); }, 8000);
        };
        script.onerror = ()=> reject("Ad SDK failed");
        document.body.appendChild(script);
      });
    }
    async function enforceDeviceLock(uid){
      let stored = localStorage.getItem('device_id');
      if(!stored){ stored = 'dev_'+Date.now()+'_'+Math.random().toString(36); localStorage.setItem('device_id', stored); }
      let deviceId = stored.replace(/[^a-zA-Z0-9_-]/g,'_');
      let snap = await db.ref(`deviceLock/${deviceId}`).once('value');
      if(snap.val() && snap.val() !== uid){ showAlert("This device is already linked to another account.", ()=>tg.close()); throw new Error("Device locked"); }
      if(!snap.val()) await db.ref(`deviceLock/${deviceId}`).set(uid);
    }
    // ========== RENDER FUNCTIONS ==========
    function renderAll(){
      document.getElementById('user-photo').src = userState.photoUrl || 'https://via.placeholder.com/46';
      document.getElementById('user-name').innerHTML = `${userState.firstName||''} ${userState.lastName||''}`;
      document.getElementById('main-balance').innerText = (userState.balance||0).toFixed(0);
      document.getElementById('daily-ads-watched').innerHTML = `${userState.dailyAdCount||0} / ${appConfig.dailyAdLimit||50}`;
      document.getElementById('referral-count').innerText = userState.referrals||0;
      document.getElementById('total-ads-watched').innerText = userState.lifetimeAdCount||0;
      document.getElementById('total-earned').innerText = (userState.totalEarned||0).toFixed(0)+" Coins";
      document.getElementById('earning-wallet-balance').innerText = (userState.earningWallet||0).toFixed(0);
      document.getElementById('profile-photo-large').src = userState.photoUrl || 'https://via.placeholder.com/96';
      document.getElementById('profile-name-large').innerHTML = `${userState.firstName||''} ${userState.lastName||''}`;

      setTimeout(()=>{ document.getElementById('loader-screen').style.display='none'; document.getElementById('app').style.display='block'; }, 400);
      let popupData = (await db.ref('config/popupMessage').once('value')).val();
      if(popupData && (popupData.title||popupData.description)){
        let linksHtml = popupData.links?.map(l=>`<a href="${l.url}" target="_blank" class="popup-link"><img src="${l.image}" width="45"></a>`).join('')||'';
        document.getElementById('global-popup-body').innerHTML = `<div style="text-align:center;"><h2>${popupData.title||''}</h2><p>${popupData.description||''}</p>${linksHtml}<button class="action-btn close-modal" style="margin-top:20px;">Close</button></div>`;
        showModal('global-popup');
        document.querySelector('#global-popup .close-modal')?.addEventListener('click',()=>hideModal('global-popup'));
      }
    }
    initApp();
  })();
</script>
</body>
</html>
